<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
      .sidebar-item:hover { background-color: #ECFDF5; color: #059669; }
    </style>
  </head>
  <body class="flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
      <div class="p-6 border-b border-gray-100">
        <h1 class="text-xl font-bold text-emerald-600">CMSS Smart</h1>
        <p class="text-xs text-gray-400 uppercase tracking-widest">Management System</p>
      </div>
      <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
        <a href="#" onclick="loadView('Dashboard')" class="sidebar-item flex items-center p-3 rounded-lg text-gray-600 transition-colors">
          <span class="font-medium">Dashboard</span>
        </a>
        <a href="#" onclick="loadView('Students')" class="sidebar-item flex items-center p-3 rounded-lg text-gray-600 transition-colors">
          <span class="font-medium">Students</span>
        </a>
        <a href="#" onclick="loadView('Attendance')" class="sidebar-item flex items-center p-3 rounded-lg text-gray-600 transition-colors">
          <span class="font-medium">Attendance</span>
        </a>
        <a href="#" onclick="loadView('Finance')" class="sidebar-item flex items-center p-3 rounded-lg text-gray-600 transition-colors">
          <span class="font-medium">Finance</span>
        </a>
        <a href="#" onclick="loadView('AI')" class="sidebar-item flex items-center p-3 rounded-lg text-gray-600 transition-colors">
          <span class="font-medium text-emerald-600">✨ AI Tools</span>
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
        <h2 id="view-title" class="text-lg font-bold text-gray-800">Dashboard</h2>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-500"><?= Session.getActiveUser().getEmail() ?></span>
        </div>
      </header>
      
      <main id="content" class="flex-1 overflow-y-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-400 text-sm">Total Students</p>
            <h3 class="text-2xl font-bold">450</h3>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-400 text-sm">Attendance Today</p>
            <h3 class="text-2xl font-bold">94%</h3>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-400 text-sm">Monthly Revenue</p>
            <h3 class="text-2xl font-bold text-emerald-600">PKR 1.2M</h3>
          </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <h4 class="font-bold mb-4">Recent Activity</h4>
          <div id="activity-list" class="space-y-4">
            <p class="text-gray-400 italic">Loading activity...</p>
          </div>
        </div>
      </main>
    </div>

    <script>
      function loadView(view) {
        document.getElementById('view-title').innerText = view;
        document.getElementById('content').innerHTML = '<div class="flex justify-center p-12"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600"></div></div>';
        
        if (view === 'Students') {
          google.script.run.withSuccessHandler(renderStudents).getSheetData('Students');
        } else if (view === 'Dashboard') {
          location.reload();
        }
      }

      function renderStudents(data) {
        let html = '<div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">Student Directory</h3><button class="bg-emerald-600 text-white px-4 py-2 rounded-lg">Add New</button></div>';
        html += '<table class="w-full text-left border-collapse">';
        html += '<thead class="bg-gray-50"><tr><th class="p-3">ID</th><th class="p-3">Name</th><th class="p-3">Class</th><th class="p-3">Status</th></tr></thead>';
        html += '<tbody>';
        data.forEach(s => {
          html += `<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="p-3 font-mono text-xs">${s.StudentID}</td><td class="p-3 font-medium">${s.FirstName} ${s.LastName}</td><td class="p-3">${s.ClassID}</td><td class="p-3"><span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">${s.Status}</span></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('content').innerHTML = html;
      }

      // Initial Load
      google.script.run.withSuccessHandler(data => {
        const list = document.getElementById('activity-list');
        list.innerHTML = data.slice(0, 5).map(log => `
          <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
            <div>
              <p class="text-sm font-medium text-gray-800">${log.Action}: ${log.Details}</p>
              <p class="text-xs text-gray-400">${new Date(log.Timestamp).toLocaleString()}</p>
            </div>
            <span class="text-xs text-gray-500">${log.User}</span>
          </div>
        `).join('') || '<p class="text-gray-400">No recent activity.</p>';
      }).getSheetData('ActivityLogs');
    </script>
  </body>
</html>
